name: Linux Build

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev libjack-jackd2-dev 

      - name: Build
        run: cargo build-tui

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: oxidrive-linux-tui
          path: target/debug/oxidrive

