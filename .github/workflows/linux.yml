name: Linux Build

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
        component:
          - name: tui
            command: build-tui
            artifact: oxidrive-linux-tui
          # - name: gui
          #   command: build-gui
          #   artifact: oxidrive-linux-gui
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.component.name }}

      - name: Install Cross-rs
        run: cargo install cross

      - name: Build
        run: cross ${{ matrix.component.command }} --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component.artifact }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/debug/oxidrive

