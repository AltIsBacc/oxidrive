[build]
pre-build = [
    "apt-get update && apt-get install -y pkg-config libasound2-dev libjack-jackd2-dev"
]

[target.x86_64-unknown-linux-gnu]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y pkg-config libasound2-dev:$CROSS_DEB_ARCH libjack-jackd2-dev:$CROSS_DEB_ARCH"
]

